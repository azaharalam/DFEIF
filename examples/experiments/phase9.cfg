[gpu_smoke]
backend = gpu_mlir
out = batch_out
mlir = examples/gpu_mlir/model.mlir
runtime_log = examples/gpu_mlir/runtime_metrics.csv
repeat = 2
modes = baseline,full,sampled
sampling_ratio = 0.5
include_ops = linalg.matmul
enable_overhead_profiler_tool = true
enable_semantic_attribution_tool = true
enable_dataflow_memory_proxy_tool = true

[cerebras_smoke]
backend = cerebras
out = batch_out
graph = examples/cerebras/graph.txt
sidecar = examples/cerebras/sidecar.csv
compile_report = examples/cerebras/compile_report.csv
runtime_log = examples/cerebras/runtime_log.csv
work_dir = .
compile_cmd = echo cerebras compile
run_cmd = echo cerebras run
repeat = 2
modes = baseline,full,selective
include_ops = matmul
enable_overhead_profiler_tool = true
enable_semantic_attribution_tool = true
enable_dataflow_memory_proxy_tool = true

[sambanova_smoke]
backend = sambanova
out = batch_out
graph = examples/sambanova/graph.txt
sidecar = examples/sambanova/sidecar.csv
compile_report = examples/sambanova/compile_report.csv
runtime_log = examples/sambanova/runtime_log.csv
repeat = 2
modes = baseline,full
enable_overhead_profiler_tool = true
enable_semantic_attribution_tool = true
enable_dataflow_memory_proxy_tool = true